name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如: 1.0.0)'
        required: true
        type: string
      pre_release:
        description: '是否为预发布版本'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site
        run: mkdocs build

      - name: Get previous tag
        id: previoustag
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD | head -1)
          fi
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: generate_notes
        run: |
          PREV_TAG="${{ steps.previoustag.outputs.tag }}"
          VERSION="${{ inputs.version }}"
          
          NOTES="## 版本说明\n\n"
          
          FEAT=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --grep="^feat" 2>/dev/null || echo "")
          NOTES+="### 新增功能\n"
          [ -z "$FEAT" ] && NOTES+="- 无\n" || NOTES+="${FEAT}\n"
          NOTES+="\n"
          
          FIX=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --grep="^fix" 2>/dev/null || echo "")
          NOTES+="### 问题修复\n"
          [ -z "$FIX" ] && NOTES+="- 无\n" || NOTES+="${FIX}\n"
          NOTES+="\n"
          
          DOCS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --grep="^docs" 2>/dev/null || echo "")
          NOTES+="### 文档更新\n"
          [ -z "$DOCS" ] && NOTES+="- 无\n" || NOTES+="${DOCS}\n"
          NOTES+="\n"
          
          OTHER=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --grep="^chore\|^refactor\|^style\|^test\|^ci\|^build\|^perf" 2>/dev/null || echo "")
          NOTES+="### 其他变更\n"
          [ -z "$OTHER" ] && NOTES+="- 无\n" || NOTES+="${OTHER}\n"
          NOTES+="\n"
          
          NOTES+="---\n\n"
          NOTES+="**完整更新日志：** https://github.com/${{ github.repository }}/compare/${PREV_TAG}...v${VERSION}"
          
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo -e "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: ${{ steps.generate_notes.outputs.notes }}
          prerelease: ${{ inputs.pre_release }}

  deploy:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
