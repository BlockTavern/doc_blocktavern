name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build site
        run: mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Get previous tag
        id: previoustag
        uses: actions-ecosystem/action-get-previous-tag@v1
        with:
          fallback: v0.0.0

      - name: Generate release notes
        id: generate_notes
        run: |
          PREV_TAG="${{ steps.previoustag.outputs.tag }}"
          CURRENT_TAG="${{ github.ref_name }}"
          
          # 生成更新日志
          NOTES="## 版本说明\n\n"
          NOTES+="### 新增功能\n"
          NOTES+=$(git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s" --grep="^feat" || echo "- 无")
          NOTES+="\n\n"
          NOTES+="### 问题修复\n"
          NOTES+=$(git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s" --grep="^fix" || echo "- 无")
          NOTES+="\n\n"
          NOTES+="### 文档更新\n"
          NOTES+=$(git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s" --grep="^docs" || echo "- 无")
          NOTES+="\n\n"
          NOTES+="### 其他变更\n"
          NOTES+=$(git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s" --grep="^chore\|^refactor\|^style\|^test\|^ci\|^build\|^perf" || echo "- 无")
          NOTES+="\n\n"
          NOTES+="---\n\n"
          NOTES+="**完整更新日志：** https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG}"
          
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo -e "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.generate_notes.outputs.notes }}
          generate_release_notes: false

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
